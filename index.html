<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Entrena y Nutre</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .bg-image {
            /* Sustituye esta URL por la de tu imagen final */
            background-image: url('fondo.png');
            
            /* Ajustes de fondo para que sea responsivo */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* Capa de oscurecimiento para que el texto resalte */
            background-color: rgba(0, 0, 0, 0.4);
            background-blend-mode: overlay;

            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .content {
            color: white;
            max-width: 800px;
        }

        h1 {
            font-size: 3rem; /* Tamaño para desktop */
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
        }

        /* Ajustes para Móvil */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem; /* Tamaño más pequeño para móviles */
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="content">
            <h1>LG ENTRENA Y NUTRE</h1>
            <p>DEPORTE • NUTRICIÓN • SALUD</p>
        </div>
    </div>

</body>
</html>
